name: Daily Empire Report

on:
  schedule:
    # Runs at 1:00 PM UTC (8:00 AM CST)
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # Needed to create daily report issues

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install analysis dependencies
        run: |
          npm install --no-save \
            axios@1.7.2 \
            cheerio@1.0.0 \
            adm-zip@0.5.12
        env:
          NODE_ENV: production

      - name: Run daily analysis
        run: node daily-analysis.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify outputs
        run: |
          if [ ! -f report.md ]; then
            echo "Error: report.md not generated"
            exit 1
          fi
          if [ ! -f updates.zip ]; then
            echo "Error: updates.zip not generated"
            exit 1
          fi
          echo "✓ All outputs generated successfully"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: |
            report.md
            updates.zip
          retention-days: 30

      - name: Create Daily Empire Report Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            
            const date = new Date().toISOString().split('T')[0];
            const title = `🚀 Daily Empire Report - ${date} (Run #${context.runNumber})`;
            
            const body = `**Generated:** ${new Date().toISOString()}\n` +
                         `**Repository:** ${context.repo.owner}/${context.repo.repo}\n` +
                         `**Run:** #${context.runNumber}\n\n` +
                         `---\n\n` +
                         report + 
                         `\n\n---\n\n` +
                         `**Artifacts:** [Download report + updates.zip](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['daily-report', 'empire']
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);

      - name: Cleanup
        if: always()
        run: |
          rm -rf generated/
          rm -f updates.zip
