name: PR Janitor

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without closing PRs or enabling automerge'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: pr-janitor
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Score and triage open pull requests
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const scriptPath = path.join(process.env.GITHUB_WORKSPACE, 'scripts', 'github-maintenance.js');
            const { runPrJanitor } = await import(`file://${scriptPath}`);
            await runPrJanitor({
              github,
              context,
              core,
              dryRun: process.env.DRY_RUN === 'true',
            });
