name: Repository Custodian

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  custodian-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Health checks
        id: health
        run: |
          set +e
          check_url() {
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$1")
            echo "$2:$code"
          }
          {
            check_url "https://mrdannyclark82.github.io/Milla-Rayne/" "landing"
            check_url "https://mrdannyclark82.github.io/Milla-Rayne/scene-demo.html" "scene_demo"
            check_url "https://mrdannyclark82.github.io/Milla-Rayne/api-docs/" "api_docs"
          } > health.txt
          cat health.txt
          landing=$(grep landing health.txt | cut -d: -f2)
          scene=$(grep scene_demo health.txt | cut -d: -f2)
          if [ "$landing" != "200" ] || [ "$scene" != "200" ]; then
            echo "degraded=true" >> "$GITHUB_OUTPUT"
          else
            echo "degraded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Recent workflow failures
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 20,
            });
            const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            const failed = data.workflow_runs.filter(
              (r) => r.conclusion === "failure" && new Date(r.created_at) > weekAgo
            );
            core.setOutput("failed_count", String(failed.length));
            core.setOutput(
              "failed_list",
              failed
                .slice(0, 5)
                .map((r) => `- ${r.name} (${r.head_branch}) — ${r.html_url}`)
                .join("\n") || "_None in the last 7 days._"
            );

      - name: Open issues snapshot
        id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const bugs = open.filter((i) => !i.pull_request).length;
            core.setOutput("open_issues", String(bugs));

      - name: Publish custodian report
        env:
          FAILED_COUNT: ${{ steps.ci.outputs.failed_count }}
          FAILED_LIST: ${{ steps.ci.outputs.failed_list }}
          OPEN_ISSUES: ${{ steps.issues.outputs.open_issues }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const health = fs.readFileSync("health.txt", "utf8").trim();
            const date = new Date().toISOString().split("T")[0];
            const title = `🛡️ Custodian Report — ${date}`;
            const body = [
              "**Repository custodian** — automated weekly health pass for Milla-Rayne.",
              "",
              "## Pages health",
              "```",
              health,
              "```",
              "",
              "## CI (last 7 days)",
              `Failed workflow runs: **${process.env.FAILED_COUNT}**`,
              "",
              process.env.FAILED_LIST,
              "",
              "## Open issues",
              `**${process.env.OPEN_ISSUES}** open (excluding PRs)`,
              "",
              "## Custodian duties",
              "- Keep Pages landing + scene demo reachable",
              "- Flag CI regressions for Danny / Milla review",
              "- Lab funnel: promote winners to [Mrs-Milla-Rayne](https://github.com/mrdannyclark82/Mrs-Milla-Rayne) only",
              "",
              "---",
              "_Generated by [.github/workflows/custodian.yml](.github/workflows/custodian.yml)_",
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.filter(
              (i) => !i.pull_request && i.title.startsWith("🛡️ Custodian Report")
            );

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Updated custodian issue #${existing[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
              core.info(`Created custodian issue #${issue.data.number}`);
            }